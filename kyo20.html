  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .page { display: none; }
  .page.active { display: flex; }
  .nav-btn {
    transition: all 0.2s ease;
  }
  .nav-btn.active {

  }
  .option-btn {

    border: 1px solid rgba(59, 130, 246, 0.3);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .option-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.15), transparent);
    transition: left 0.5s ease;
  }
  .option-btn:hover::before { left: 100%; }
  .option-btn:hover {

    box-shadow: 0 8px 24px rgba(14, 165, 233, 0.2);

  .option-btn:active { transform: translateY(0); }
  .label-tag {

  .value-tag {
    color: #22d3ee;
    font-weight: 700;
  }
  .header-line {
    background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.5), transparent);

  }
  .badge-dot {
    width: 8px; height: 8px;
    border-radius: 50%;

    box-shadow: 0 0 8px #10b981;

  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }

  .placeholder-card {
    background: rgba(15, 23, 42, 0.6);
    border: 1px dashed rgba(71, 85, 105, 0.5);
  }

  #kasa-table th {
    border: 1px solid rgba(71, 85, 105, 0.4);
  }
  #kasa-table td {
    border: 1px solid rgba(71, 85, 105, 0.3);

    cursor: default;
    transition: background 0.12s ease, box-shadow 0.12s ease;
  }
  #kasa-table td:focus {

    box-shadow: inset 0 0 0 2px rgba(139, 92, 246, 0.55);
    position: relative;
    z-index: 1;
  }
  #kasa-table tr:hover td {
    background: rgba(30, 41, 59, 0.35);
  }

    background: rgba(91, 33, 182, 0.12) !important;
  }
  #sidebar {

    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #sidebar.sidebar-open {
    transform: translateX(0);
  }
  #kasa-row-count::-webkit-outer-spin-button,
  #kasa-row-count::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  #kasa-row-count { -moz-appearance: textfield; appearance: textfield; }
  #kasa-grid { outline: none; }
  .kasa-td {
    cursor: default;
    user-select: none;
    caret-color: transparent;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .kasa-td[contenteditable="true"] {
    cursor: text;
    user-select: text;
    caret-color: #c4b5fd;
  }
  .kasa-td.kasa-anchor {
    background: rgba(109,40,217,0.28);
    border-color: rgba(139,92,246,0.45) !important;
  }
  .kasa-td.kasa-range {
    background: rgba(109,40,217,0.22);
    border-color: rgba(139,92,246,0.45) !important;
  }
  #kasa-sel-overlay {
    position: absolute;

  .kasa-td.kasa-editing {
    box-shadow: inset 0 0 0 2px rgba(167,139,250,1) !important;

  .kasa-td.kasa-cut {
    outline: 2px dashed rgba(167,139,250,0.6);

  }
  .kasa-row:hover .kasa-td:not(.kasa-anchor):not(.kasa-range):not(.kasa-editing) {

  }
  .kasa-row-num {
    background: rgba(15,23,42,0.75);
    color: #475569;
    font-size: 0.68rem;
    font-family: 'JetBrains Mono', monospace;
    text-align: center;

    user-select: none;

    transition: background 0.1s, color 0.1s;
  }
  .kasa-row-num:hover { background: rgba(91,33,182,0.2); color: #a78bfa; }
  .kasa-row-num.kasa-row-selected { background: rgba(91,33,182,0.38) !important; color: #c4b5fd; }
  #kasa-ctx-menu {
    position: fixed;
    z-index: 1000;
    background: #0f172a;
    border: 1px solid rgba(139,92,246,0.45);
    border-radius: 8px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.6), 0 0 16px rgba(109,40,217,0.2);
    padding: 4px 0;
    min-width: 195px;
    display: none;
  }
  .kasa-ctx-item {
    padding: 8px 16px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    color: #cbd5e1;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .kasa-ctx-item:hover { background: rgba(91,33,182,0.3); color: #ede9fe; }
  .hisse-th {
    padding: 10px 14px; font-size: 11px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em; color: #34d399; white-space: nowrap; font-weight: 600;
    border-bottom: 1px solid rgba(71,85,105,0.45); background: rgba(15,23,42,0.7);
    cursor: pointer; user-select: none;
  }
  .hisse-th:hover { color: #6ee7b7; }
  .hisse-th.dim { color: #334155; cursor: default; }
  .hisse-td { padding: 10px 14px; font-size: 13px; white-space: nowrap; }
  .hisse-row { border-bottom: 1px solid rgba(71,85,105,0.18); transition: background 0.12s; }
  .pos { color: #34d399; }
  .neg { color: #f87171; }
  .neu { color: #94a3b8; }
  .btn-refresh {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px; font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(16,185,129,0.1); border: 1px solid rgba(52,211,153,0.3);
    color: #6ee7b7; transition: background 0.15s;
  }
  .btn-refresh:hover { background: rgba(16,185,129,0.25); }

  .progress-bar-wrap { height: 3px; background: rgba(71,85,105,0.3); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg,#10b981,#34d399); border-radius: 2px; transition: width 0.3s ease; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 0.8s linear infinite; }
  .uyari-filter-btn {
    padding: 8px 14px; border-radius: 9px; border: 1px solid rgba(71,85,105,0.55);
    background: rgba(15,23,42,0.45); color: #94a3b8; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; letter-spacing: 0.02em; transition: all .14s; cursor: pointer;
  }
  .uyari-filter-btn:hover { color: #6ee7b7; border-color: rgba(52,211,153,0.45); }
  .uyari-filter-btn.active {
    color: #34d399; border-color: rgba(52,211,153,0.7); background: rgba(16,185,129,0.15);
    box-shadow: 0 0 16px rgba(52,211,153,0.18);
  }
  .uyari-card {
    border: 1px solid rgba(71,85,105,0.35); background: rgba(10,14,26,0.65); border-radius: 10px;
    padding: 11px 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .uyari-badge {
    display: inline-flex; align-items: center; padding: 3px 7px; border-radius: 999px;
    border: 1px solid rgba(52,211,153,0.35); background: rgba(16,185,129,0.12);
    color: #6ee7b7; font-size: 10px; font-family: 'JetBrains Mono', monospace;
  }
  .kasa-ctx-separator { height: 1px; background: rgba(71,85,105,0.4); margin: 4px 0; }

  .ort-row-num:hover { background: rgba(91,33,182,.2); color: #a78bfa; }
  .ort-row-num.ort-row-selected { background: rgba(91,33,182,.38) !important; color: #c4b5fd; }
  #ort-ctx-menu { position: fixed; z-index: 1000; background: #0f172a; border: 1px solid rgba(167,139,250,.45); border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,.6), 0 0 16px rgba(109,40,217,.2); padding: 4px 0; min-width: 195px; display: none; }
  .ort-ctx-item { padding: 8px 16px; font-size: .78rem; font-family: 'JetBrains Mono',monospace; color: #cbd5e1; cursor: pointer; transition: background .1s, color .1s; }
  .ort-ctx-item:hover { background: rgba(91,33,182,.3); color: #ede9fe; }
  .ort-col-th { position: relative; cursor: default; }
  .ort-col-del-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); opacity: 0; font-size: 9px; color: #f87171; border: none; background: none; cursor: pointer; padding: 0 3px; line-height: 1; transition: opacity .15s; }
  .ort-col-th:hover .ort-col-del-btn { opacity: .65; }
  .ort-col-del-btn:hover { opacity: 1 !important; }
  /* ── HİSSE Detay Modal ── */
  #hisse-detail-modal { position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.88); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
  #hisse-detail-box { background:#0a0e1a; border:1px solid rgba(52,211,153,0.2); border-radius:18px; width:100%; max-width:960px; max-height:88vh; display:flex; flex-direction:column; box-shadow:0 24px 80px rgba(0,0,0,0.85),0 0 48px rgba(52,211,153,0.06); overflow:hidden; }

  .hd-period-btn:hover { border-color:rgba(52,211,153,0.5); color:#34d399; }
  .hd-period-btn.hd-active { background:rgba(52,211,153,0.12); border-color:rgba(52,211,153,0.6); color:#34d399; box-shadow:0 0 10px rgba(52,211,153,0.2); }

  <script>
  // State
  const state = {
    makineTipi: 'Kabinli', // Kabinli <-> Konveyör
    tankSayisi: 1, // 1,2,3,4
    otomatikDolum: 'VAR', // VAR <-> YOK
    saltGrubu: 'Schneider', // Schneider <-> Siemens
    motors: [] // Motor listesi
  };

  const motorGrubuOptions = {
    'Pompa': { icon: 'droplet', color: '#0ea5e9', label: 'Pompa' },
    'Redüktör': { icon: 'cog', color: '#8b5cf6', label: 'Redüktör' },
    'Fan': { icon: 'wind', color: '#06b6d4', label: 'Fan' }
  };

  const motorAdiOptions = {
    'Pompa': [
      { adi: 'Ön Yıkama Pompa Motoru', kod: 'PE01' },
      { adi: 'Yıkama Pompa Motoru', kod: 'PE02' },
      { adi: 'Ön Durulama Pompa Motoru', kod: 'PE03' },
      { adi: 'Durulama Pompa Motoru', kod: 'PE04' },
      { adi: 'Otomatik Drenaj Pompası Motoru', kod: 'PE05' },

      { adi: 'Arıtma Dönüş Pompası Motoru', kod: 'PE09' },
      { adi: '1. Dozaj Pompası Motoru', kod: 'PE10' },
      { adi: '2. Dozaj Pompası Motoru', kod: 'PE11' },
      { adi: '3. Dozaj Pompası Motoru', kod: 'PE12' },
      { adi: 'Hassas Filtre Pompası Motoru', kod: 'PE13' },
      { adi: 'Yağ Ayırıcı Pompası Motoru', kod: 'PE14' },
      { adi: 'xxx Pompası Motoru', kod: 'PE15' }
    ],
    'Redüktör': [
      { adi: 'Sepet Redüktörü Motoru', kod: 'GE01' },
      { adi: 'Tambur Redüktörü Motoru', kod: 'GE02' },
      { adi: 'Otomatik Yükleme Motoru', kod: 'GE03' },
      { adi: 'Kapı Redüktörü Motoru', kod: 'GE04' },
      { adi: '1. Konveyör Redüktörü Motoru', kod: 'GE05' },
      { adi: '1. Yağ Sıyırıcı Redüktörü Motoru', kod: 'GE06' },
      { adi: '2. Yağ Sıyırıcı Redüktörü Motoru', kod: 'GE07' },
      { adi: '1. Yükleme Redüktör Motoru', kod: 'GE08' },
      { adi: '2. Yükleme Redüktör Motoru', kod: 'GE09' },
      { adi: 'xxx Redüktör Motoru', kod: 'GE10' }
    ],
    'Fan': [
      { adi: 'Egzos Fanı Motoru', kod: 'FE01' },
      { adi: '1. Kurutma Fanı Motoru', kod: 'FE02' },
      { adi: '2. Kurutma Fanı Motoru', kod: 'FE03' },
      { adi: '1. Blower Motoru', kod: 'FE04' },
      { adi: '2. Blower Motoru', kod: 'FE05' },
      { adi: '3. Blower Motoru', kod: 'FE06' },
      { adi: '4. Blower Motoru', kod: 'FE07' },
      { adi: 'xx Fan Motoru', kod: 'FE08' },
      { adi: 'xxx Fan Motoru', kod: 'FE09' },
      { adi: 'xxxx Fan Motoru', kod: 'FE10' }
    ]
  };

  // Motor dropdown modal
  function createMotorGrubuDropdown(motorId, currentValue, triggerBtn) {
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 z-50 bg-black/50 backdrop-blur-sm';
    
    const content = document.createElement('div');
    content.className = 'absolute bg-slate-900 border border-slate-700 rounded-lg shadow-xl p-4 w-72';
    
    // Position relative to button
    const rect = triggerBtn.getBoundingClientRect();
    content.style.top = (rect.bottom + 4) + 'px';
    content.style.left = Math.max(8, rect.left) + 'px';
    content.style.maxWidth = 'calc(100vw - 16px)';
    
    const title = document.createElement('h3');
    title.className = 'text-sm font-bold text-white mb-3';
    title.textContent = 'Motor Grubu';
    content.appendChild(title);
    
    const grid = document.createElement('div');
    grid.className = 'flex flex-col gap-2';
    
    Object.entries(motorGrubuOptions).forEach(([key, opt]) => {
      const btn = document.createElement('button');
      btn.className = `flex items-center gap-3 p-3 rounded-lg text-sm font-semibold transition ${
        currentValue === key 
          ? 'bg-cyan-500/20 border border-cyan-500 text-cyan-300' 
          : 'border border-slate-700 hover:border-cyan-500 bg-slate-800/40 text-slate-300'
      }`;
      
      const icon = document.createElement('i');
      icon.setAttribute('data-lucide', opt.icon);
      icon.className = 'w-5 h-5';
      icon.style.color = opt.color;
      
      const label = document.createElement('span');
      label.className = 'font-semibold';
      label.textContent = opt.label;
      
      btn.appendChild(icon);
      btn.appendChild(label);
      
      btn.addEventListener('click', () => {
        const row = document.getElementById(`motor-row-${motorId}`);
        row.querySelector('.motor-grubu-cell').textContent = key;
        row.dataset.grubu = key;
        
        // Motor Adı dropdown'ı güncelle
        const adiSelect = row.querySelector('.motor-adi-select');
        adiSelect.innerHTML = '<option value="">Seç...</option>';
        if (motorAdiOptions[key]) {
          motorAdiOptions[key].forEach(item => {
            const option = document.createElement('option');
            option.value = item.adi;
            option.dataset.kod = item.kod;
            option.textContent = item.adi;
            adiSelect.appendChild(option);
          });
        }
        adiSelect.value = '';
        row.querySelector('.motor-kod-input').value = '';
        
        modal.remove();
        lucide.createIcons();
      });
      
      grid.appendChild(btn);
    });
    
    content.appendChild(grid);
    modal.appendChild(content);
    document.body.appendChild(modal);
    
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.remove();
    });
    
    lucide.createIcons();
  }

  // Motor satırı oluştur
  function createMotorRow(motorId) {
    const row = document.createElement('tr');
    row.id = `motor-row-${motorId}`;
    row.className = 'border-t border-slate-700/50 hover:bg-slate-800/30 transition';
    row.style.height = '50px';
    row.dataset.motorId = motorId;
    row.dataset.grubu = '';
    
    // Motor Grubu (tıklanabilir küçük buton)
    const grubuCell = document.createElement('td');
    grubuCell.className = 'px-2 py-3 text-sm';
    const grubuBtn = document.createElement('button');
    grubuBtn.className = 'motor-grubu-cell px-3 py-2 rounded-lg bg-slate-800/40 border border-slate-700 hover:border-cyan-500 hover:bg-slate-800 transition text-slate-300 text-sm font-semibold cursor-pointer';
    grubuBtn.textContent = 'Seç';
    grubuBtn.style.minWidth = '90px';
    grubuBtn.addEventListener('click', () => {
      createMotorGrubuDropdown(motorId, row.dataset.grubu, grubuBtn);
    });
    grubuCell.appendChild(grubuBtn);
    row.appendChild(grubuCell);
    
    // Grup Kodu (otomatik doldurulacak)
    const kodCell = document.createElement('td');
    kodCell.className = 'px-2 py-3 text-sm';
    const kodInput = document.createElement('input');
    kodInput.type = 'text';
    kodInput.className = 'motor-kod-input w-full px-2 py-1 bg-slate-800/30 border border-slate-700 rounded text-slate-300 text-sm focus:outline-none';
    kodInput.placeholder = '-';
    kodInput.readOnly = true;
    kodCell.appendChild(kodInput);
    row.appendChild(kodCell);
    
    // Motor Adı (dropdown)
    const adiCell = document.createElement('td');
    adiCell.className = 'px-2 py-3 text-sm';
    const adiSelect = document.createElement('select');
    adiSelect.className = 'motor-adi-select w-full px-2 py-1 bg-slate-800/40 border border-slate-700 rounded text-slate-300 text-sm focus:border-cyan-500 focus:outline-none cursor-pointer';
    adiSelect.style.appearance = 'auto';
    
    const defaultOption = document.createElement('option');
    defaultOption.value = '';
    defaultOption.textContent = 'Seç...';
    adiSelect.appendChild(defaultOption);
    
    // Motor Adı seçim yapılırsa Grup Kodu otomatik doldur
    adiSelect.addEventListener('change', () => {
      const selectedOption = adiSelect.options[adiSelect.selectedIndex];
      if (selectedOption.dataset.kod) {
        kodInput.value = selectedOption.dataset.kod;
      } else {
        kodInput.value = '';
      }
    });
    
    adiCell.appendChild(adiSelect);
    row.appendChild(adiCell);
    
    // Güç (Dropdown)
    const gucCell = document.createElement('td');
    gucCell.className = 'px-2 py-3 text-sm';
    const gucSelect = document.createElement('select');
    gucSelect.className = 'w-full px-2 py-1 bg-slate-800/40 border border-slate-700 rounded text-slate-300 text-sm focus:border-cyan-500 focus:outline-none cursor-pointer';
    gucSelect.style.appearance = 'auto';
    
    const gucOptions = [0.09, 0.18, 0.25, 0.37, 0.55, 0.75, 1.10, 1.50, 2.20, 3.00, 3.70, 4.00, 5.50, 7.50, 11.00, 15.00, 18.50, 22.00];
    const gucDefaultOption = document.createElement('option');
    gucDefaultOption.value = '';
    gucDefaultOption.textContent = 'Seç...';
    gucSelect.appendChild(gucDefaultOption);
    
    gucOptions.forEach(guc => {
      const option = document.createElement('option');
      option.value = guc;
      option.textContent = guc.toFixed(2);
      gucSelect.appendChild(option);
    });
    
    gucCell.appendChild(gucSelect);
    row.appendChild(gucCell);
    
    // Akım (Otomatik hesaplan)
    const akimCell = document.createElement('td');
    akimCell.className = 'px-2 py-3 text-sm';
    const akimInput = document.createElement('input');
    akimInput.type = 'text';
    akimInput.className = 'w-full px-2 py-1 bg-slate-800/30 border border-slate-700 rounded text-slate-300 text-sm focus:outline-none';
    akimInput.placeholder = '0.00';
    akimInput.readOnly = true;
    akimCell.appendChild(akimInput);
    row.appendChild(akimCell);
    
    // Koruma Tipi (Toggle Button)
    const korumaCell = document.createElement('td');
    korumaCell.className = 'px-2 py-3 text-center';
    const korumaBtn = document.createElement('button');
    korumaBtn.className = 'px-3 py-1 rounded-lg bg-slate-800/40 border border-slate-700 hover:border-cyan-500 hover:bg-slate-800 transition text-slate-300 text-sm font-semibold cursor-pointer h-8 flex items-center justify-center';
    korumaBtn.textContent = 'MKŞ/Kontaktör';
    korumaBtn.dataset.korumaType = 'kontaktor';
    korumaBtn.style.minWidth = '130px';
    korumaBtn.addEventListener('click', () => {
      if (korumaBtn.dataset.korumaType === 'kontaktor') {
        korumaBtn.textContent = 'Invertör/Sigorta';
        korumaBtn.dataset.korumaType = 'invertor';
      } else {
        korumaBtn.textContent = 'MKŞ/Kontaktör';
        korumaBtn.dataset.korumaType = 'kontaktor';
      }
    });
    korumaCell.appendChild(korumaBtn);
    row.appendChild(korumaCell);
    
    // Güç değişince akımı hesapla
    gucSelect.addEventListener('change', () => {
      if (gucSelect.value) {
        const gucValue = parseFloat(gucSelect.value);
        const akimValue = (gucValue * 2).toFixed(2);
        akimInput.value = akimValue;
      } else {
        akimInput.value = '';
      }
    });
    
    // Sürücü 1-3 (text input)
    for (let i = 1; i <= 3; i++) {
      const sürücüCell = document.createElement('td');
      sürücüCell.className = 'px-2 py-3 text-center';
      const sürücüInput = document.createElement('input');
      sürücüInput.type = 'text';
      sürücüInput.className = 'w-full px-2 py-1 bg-slate-800/40 border border-slate-700 rounded text-slate-300 text-sm focus:border-cyan-500 focus:outline-none text-center';
      sürücüInput.placeholder = '-';
      sürücüCell.appendChild(sürücüInput);
      row.appendChild(sürücüCell);
    }
    
    // İşlem (Sil)
    const islemCell = document.createElement('td');
    islemCell.className = 'px-2 py-3 text-center';
    const silBtn = document.createElement('button');
    silBtn.className = 'p-1.5 rounded-lg hover:bg-red-500/20 text-slate-400 hover:text-red-400 transition';
    const silIcon = document.createElement('i');
    silIcon.setAttribute('data-lucide', 'trash-2');
    silIcon.className = 'w-4 h-4';
    silBtn.appendChild(silIcon);
    silBtn.addEventListener('click', () => {
      row.remove();
      state.motors = state.motors.filter(m => m.id !== motorId);
    });
    islemCell.appendChild(silBtn);
    row.appendChild(islemCell);
    
    return row;
  }

  // Navigation
  const navButtons = document.querySelectorAll('.nav-btn');
  const pages = document.querySelectorAll('.page');

  navButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.page;
      navButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      pages.forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${target}`).classList.add('active');
      document.getElementById('kasa-header-actions').style.display = target === 'kasa' ? 'flex' : 'none';
      document.getElementById('ort-header-actions').style.display = target === 'ortaklik' ? 'flex' : 'none';
      document.getElementById('ort-view-toggle-wrap').style.display = target === 'ortaklik' ? 'block' : 'none';
      document.getElementById('hisse-header-actions').style.display = target === 'hisse' ? 'flex' : 'none';
      if (target === 'hisse') hisseOnActivate();
      if (target === 'uyari') uyariOnActivate();
    });
  });



  // ── KASA Spreadsheet ───────────────────────────────────────────
  const KASA_COLS = 5;
  let kasaRowCount = 0;
  let kSel = null;      // { r, c } anchor
  let kSelEnd = null;   // { r, c } range end
  let kEditCell = null; // currently editing td
  let kClip = null;     // { data:[], cut:bool }
  let kCutCells = [];
  let kRowSelMode = false;
  let kCtxTargetRow = null;

  function kasaCell(r, c) {
    return document.querySelector(`#kasa-tbody td[data-row="${r}"][data-col="${c}"]`);
  }

  function kasaCreateRow() {
    const r = kasaRowCount++;
    const row = document.createElement('tr');
    row.className = 'kasa-row';
    const numTd = document.createElement('td');
    numTd.className = 'kasa-row-num';
    numTd.textContent = '–';
    row.appendChild(numTd);
    for (let c = 0; c < KASA_COLS; c++) {
      const td = document.createElement('td');
      td.dataset.row = r;
      td.dataset.col = c;
      td.className = 'kasa-td px-3 py-2 text-sm text-slate-300 mono text-center';
      td.style.height = '36px';
      td.style.overflow = 'hidden';
      row.appendChild(td);
    }
    return row;
  }

  function kasaAddRow() {
    const tbody = document.getElementById('kasa-tbody');
    tbody.appendChild(kasaCreateRow());
    kasaRenumberRows();
  }
  for (let i = 0; i < 15; i++) kasaAddRow();

  function kasaAddRows() {
    const input = document.getElementById('kasa-row-count');
    const n = Math.max(1, parseInt(input.value) || 1);
    const tbody = document.getElementById('kasa-tbody');
    for (let i = 0; i < n; i++) tbody.appendChild(kasaCreateRow());
    kasaRenumberRows();
    lucide.createIcons();
  }

  function kasaRenumberRows() {
    document.querySelectorAll('#kasa-tbody .kasa-row').forEach((row, i) => {
      const numTd = row.querySelector('.kasa-row-num');
      if (numTd) numTd.textContent = i + 1;
    });
  }

  function kasaHighlight() {
    document.querySelectorAll('#kasa-tbody .kasa-td').forEach(td =>
      td.classList.remove('kasa-anchor', 'kasa-range'));
    document.querySelectorAll('#kasa-tbody .kasa-row-num').forEach(td =>
      td.classList.remove('kasa-row-selected'));
    if (!kSel) { kasaUpdateOverlay(); return; }
    const r1 = Math.min(kSel.r, (kSelEnd || kSel).r);
    const r2 = Math.max(kSel.r, (kSelEnd || kSel).r);
    const c1 = Math.min(kSel.c, (kSelEnd || kSel).c);
    const c2 = Math.max(kSel.c, (kSelEnd || kSel).c);
    for (let r = r1; r <= r2; r++) {
      for (let c = c1; c <= c2; c++) {
        const td = kasaCell(r, c);
        if (!td) continue;
        td.classList.add(r === kSel.r && c === kSel.c ? 'kasa-anchor' : 'kasa-range');
      }
      if (kRowSelMode) {
        const firstData = kasaCell(r, 0);
        if (firstData) {
          const numTd = firstData.closest('tr').querySelector('.kasa-row-num');
          if (numTd) numTd.classList.add('kasa-row-selected');
        }
      }
    }
    kasaUpdateOverlay();
  }

  function kasaUpdateOverlay() {
    const overlay = document.getElementById('kasa-sel-overlay');
    if (!overlay || !kSel) { if (overlay) overlay.style.display = 'none'; return; }
    const r1 = Math.min(kSel.r, (kSelEnd||kSel).r);
    const r2 = Math.max(kSel.r, (kSelEnd||kSel).r);
    const c1 = Math.min(kSel.c, (kSelEnd||kSel).c);
    const c2 = Math.max(kSel.c, (kSelEnd||kSel).c);
    const topLeft = kasaCell(r1, c1);
    const botRight = kasaCell(r2, c2);
    if (!topLeft || !botRight) { overlay.style.display = 'none'; return; }
    const container = overlay.parentElement;
    const cRect = container.getBoundingClientRect();
    const tlRect = topLeft.getBoundingClientRect();
    const brRect = botRight.getBoundingClientRect();
    overlay.style.display = 'block';
    overlay.style.left   = (tlRect.left - cRect.left + container.scrollLeft) + 'px';
    overlay.style.top    = (tlRect.top  - cRect.top  + container.scrollTop)  + 'px';
    overlay.style.width  = (brRect.right  - tlRect.left) + 'px';
    overlay.style.height = (brRect.bottom - tlRect.top)  + 'px';
  }

  function kasaEnterEdit(td, clear) {
    if (!td) return;
    if (kEditCell === td) return;
    kasaExitEdit();
    kEditCell = td;
    td.contentEditable = 'true';
    td.classList.add('kasa-editing');
    if (clear) td.textContent = '';
    td.focus();
    if (!clear) {
      const rng = document.createRange();
      rng.selectNodeContents(td);
      rng.collapse(false);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(rng);
    }
  }

  function kasaExitEdit() {
    if (!kEditCell) return;
    kEditCell.contentEditable = 'false';
    kEditCell.classList.remove('kasa-editing');
    kEditCell = null;
  }

  function kasaMoveSel(dr, dc, extend) {
    if (!kSel) return;
    const ref = extend ? (kSelEnd || kSel) : kSel;
    let nr = Math.max(0, ref.r + dr);
    let nc = Math.max(0, Math.min(KASA_COLS - 1, ref.c + dc));
    while (nr >= kasaRowCount) kasaAddRow();
    if (extend) {
      kSelEnd = { r: nr, c: nc };
    } else {
      kSel = { r: nr, c: nc };
      kSelEnd = null;
    }
    kasaHighlight();
  }

  function kasaClearSel() {
    if (!kSel) return;
    const r1 = Math.min(kSel.r, (kSelEnd||kSel).r), r2 = Math.max(kSel.r, (kSelEnd||kSel).r);
    const c1 = Math.min(kSel.c, (kSelEnd||kSel).c), c2 = Math.max(kSel.c, (kSelEnd||kSel).c);
    for (let r=r1;r<=r2;r++) for (let c=c1;c<=c2;c++) { const t=kasaCell(r,c); if(t) t.textContent=''; }
  }

  function kasaCopy(cut) {
    if (!kSel) return;
    const r1=Math.min(kSel.r,(kSelEnd||kSel).r), r2=Math.max(kSel.r,(kSelEnd||kSel).r);
    const c1=Math.min(kSel.c,(kSelEnd||kSel).c), c2=Math.max(kSel.c,(kSelEnd||kSel).c);
    const data=[];
    for (let r=r1;r<=r2;r++) {
      const row=[];
      for (let c=c1;c<=c2;c++) { const t=kasaCell(r,c); row.push(t?t.textContent:''); }
      data.push(row);
    }
    kCutCells.forEach(t=>t.classList.remove('kasa-cut')); kCutCells=[];
    kClip={data,cut};
    if (cut) {
      for (let r=r1;r<=r2;r++) for (let c=c1;c<=c2;c++) {
        const t=kasaCell(r,c); if(t){t.classList.add('kasa-cut');kCutCells.push(t);}
      }
    }
  }

  function kasaPaste() {
    if (!kClip||!kSel) return;
    const {data,cut}=kClip; const sr=kSel.r, sc=kSel.c;
    while (kasaRowCount<sr+data.length) kasaAddRow();
    for (let dr=0;dr<data.length;dr++)
      for (let dc=0;dc<data[dr].length;dc++) {
        const t=kasaCell(sr+dr,sc+dc); if(t) t.textContent=data[dr][dc];
      }
    if (cut) { kCutCells.forEach(t=>{t.textContent='';t.classList.remove('kasa-cut');}); kCutCells=[]; kClip=null; }
  }

  const kasaGrid = document.getElementById('kasa-grid');
  let kDragging = false;

  kasaGrid.addEventListener('mousedown', e => {
    const numTd = e.target.closest('#kasa-tbody .kasa-row-num');
    if (numTd) {
      if (kEditCell) kasaExitEdit();
      const tr = numTd.closest('tr');
      const firstData = tr.querySelector('.kasa-td');
      if (!firstData) return;
      const r = +firstData.dataset.row;
      if (e.shiftKey && kSel && kRowSelMode) {
        kSelEnd = { r, c: KASA_COLS - 1 };
        kSel = { r: kSel.r, c: 0 };
      } else {
        kSel = { r, c: 0 };
        kSelEnd = { r, c: KASA_COLS - 1 };
      }
      kRowSelMode = true;
      kasaHighlight();
      kasaGrid.focus();
      kDragging = true;
      e.preventDefault();
      return;
    }
    const td = e.target.closest('#kasa-tbody .kasa-td');
    if (!td) {
      if (kEditCell) { kasaExitEdit(); kasaHighlight(); }
      return;
    }
    if (kEditCell && kEditCell !== td) kasaExitEdit();
    kRowSelMode = false;
    const r=+td.dataset.row, c=+td.dataset.col;
    if (e.shiftKey && kSel) { kSelEnd={r,c}; }
    else { kSel={r,c}; kSelEnd=null; }
    kasaHighlight();
    kasaGrid.focus();
    kDragging = true;
    e.preventDefault();
  });

  document.addEventListener('mouseover', e => {
    if (!kDragging || !kSel) return;
    if (kRowSelMode) {
      const el = e.target.closest('#kasa-tbody .kasa-row-num') || e.target.closest('#kasa-tbody .kasa-td');
      if (!el) return;
      const tr = el.closest('tr');
      const firstData = tr.querySelector('.kasa-td');
      if (!firstData) return;
      kSelEnd = { r: +firstData.dataset.row, c: KASA_COLS - 1 };
      kSel = { r: kSel.r, c: 0 };
    } else {
      const td = e.target.closest('#kasa-tbody .kasa-td');
      if (!td) return;
      kSelEnd = { r:+td.dataset.row, c:+td.dataset.col };
    }
    kasaHighlight();
  });

  document.addEventListener('mouseup', () => { kDragging = false; });

  kasaGrid.addEventListener('dblclick', e => {
    const td = e.target.closest('#kasa-tbody .kasa-td');
    if (!td) return;
    kSel={r:+td.dataset.row, c:+td.dataset.col}; kSelEnd=null;
    kasaHighlight();
    kasaEnterEdit(td, false);
  });

  kasaGrid.addEventListener('keydown', e => {
    if (kEditCell) {
      if (e.key==='Escape') { e.preventDefault(); kasaExitEdit(); kasaHighlight(); kasaGrid.focus(); }
      else if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); kasaExitEdit(); kasaMoveSel(1,0,false); kasaGrid.focus(); }
      else if (e.key==='Tab') { e.preventDefault(); kasaExitEdit(); kasaMoveSel(0,e.shiftKey?-1:1,false); kasaGrid.focus(); }
      return;
    }
    if (!kSel) return;
    if (e.ctrlKey||e.metaKey) {
      if (e.key==='c') { e.preventDefault(); kasaCopy(false); }
      else if (e.key==='x') { e.preventDefault(); kasaCopy(true); }
      else if (e.key==='v') { e.preventDefault(); kasaPaste(); }
      return;
    }
    const arrows={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
    if (arrows[e.key]) { e.preventDefault(); kasaMoveSel(...arrows[e.key], e.shiftKey); return; }
    if (e.key==='Delete'||e.key==='Backspace') { e.preventDefault(); if (kRowSelMode) kasaDeleteSelectedRows(); else kasaClearSel(); return; }
    if (e.key==='F2') { e.preventDefault(); kasaEnterEdit(kasaCell(kSel.r,kSel.c),false); return; }
    if (e.key==='Enter') { e.preventDefault(); kasaEnterEdit(kasaCell(kSel.r,kSel.c),false); return; }
    if (e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey) {
      kasaEnterEdit(kasaCell(kSel.r,kSel.c), true);
    }
  });

  // ── KASA Row operations ────────────────────────────────────────
  function kasaDeleteSelectedRows() {
    if (!kSel) return;
    const r1 = Math.min(kSel.r, (kSelEnd||kSel).r);
    const r2 = Math.max(kSel.r, (kSelEnd||kSel).r);
    for (let r = r1; r <= r2; r++) {
      const td = kasaCell(r, 0);
      if (td) td.closest('tr').remove();
    }
    kSel = null; kSelEnd = null; kRowSelMode = false;
    kasaHighlight();
    kasaRenumberRows();
  }

  function kasaCtxInsertAbove() {
    document.getElementById('kasa-ctx-menu').style.display = 'none';
    if (kCtxTargetRow === null) return;
    const r1 = kSel ? Math.min(kSel.r, (kSelEnd||kSel).r) : kCtxTargetRow;
    const refTd = kasaCell(r1, 0);
    if (!refTd) return;
    document.getElementById('kasa-tbody').insertBefore(kasaCreateRow(), refTd.closest('tr'));
    kasaRenumberRows();
    kSel = null; kSelEnd = null; kRowSelMode = false; kasaHighlight();
  }

  function kasaCtxInsertBelow() {
    document.getElementById('kasa-ctx-menu').style.display = 'none';
    if (kCtxTargetRow === null) return;
    const r2 = kSel ? Math.max(kSel.r, (kSelEnd||kSel).r) : kCtxTargetRow;
    const refTd = kasaCell(r2, 0);
    if (!refTd) return;
    document.getElementById('kasa-tbody').insertBefore(kasaCreateRow(), refTd.closest('tr').nextSibling);
    kasaRenumberRows();
    kSel = null; kSelEnd = null; kRowSelMode = false; kasaHighlight();
  }

  function kasaCtxDeleteRows() {
    document.getElementById('kasa-ctx-menu').style.display = 'none';
    kasaDeleteSelectedRows();
  }

  kasaGrid.addEventListener('contextmenu', e => {
    const numTd = e.target.closest('#kasa-tbody .kasa-row-num');
    if (!numTd) return;
    e.preventDefault();
    const firstData = numTd.closest('tr').querySelector('.kasa-td');
    if (!firstData) return;
    const r = +firstData.dataset.row;
    const r1 = kSel && kRowSelMode ? Math.min(kSel.r, (kSelEnd||kSel).r) : r + 1;
    const r2 = kSel && kRowSelMode ? Math.max(kSel.r, (kSelEnd||kSel).r) : r - 1;
    if (!kRowSelMode || r < r1 || r > r2) {
      kSel = { r, c: 0 }; kSelEnd = { r, c: KASA_COLS - 1 };
      kRowSelMode = true; kasaHighlight();
    }
    kCtxTargetRow = r;
    const menu = document.getElementById('kasa-ctx-menu');
    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    setTimeout(() => {
      const rect = menu.getBoundingClientRect();
      if (rect.right > window.innerWidth) menu.style.left = (e.clientX - rect.width) + 'px';
      if (rect.bottom > window.innerHeight) menu.style.top = (e.clientY - rect.height) + 'px';
    }, 0);
  });

  document.addEventListener('click', e => {
    const menu = document.getElementById('kasa-ctx-menu');
    if (menu && !menu.contains(e.target)) menu.style.display = 'none';
  });

  document.body.insertAdjacentHTML('beforeend', `
    <div id="kasa-ctx-menu">
      <div class="kasa-ctx-item" onclick="kasaCtxInsertAbove()">&uarr; &Uuml;stüne Sat&#x131;r Ekle</div>
      <div class="kasa-ctx-item" onclick="kasaCtxInsertBelow()">&darr; Alt&#x131;na Sat&#x131;r Ekle</div>
      <div class="kasa-ctx-separator"></div>
      <div class="kasa-ctx-item" style="color:#f87171;" onclick="kasaCtxDeleteRows()">&#x2715; Sat&#x131;r&#x131; Sil</div>
    </div>`);

  // ── KASA Save / Export / Import ───────────────────────────────
  function kasaGetData() {
    const rows = [];
    document.querySelectorAll('#kasa-tbody .kasa-row').forEach(row => {
      const cells = row.querySelectorAll('.kasa-td');
      rows.push([...cells].map(td => td.textContent));
    });
    return rows;
  }

  function kasaSave() {
    localStorage.setItem('kasa-data', JSON.stringify(kasaGetData()));
    const btn = document.querySelector('#kasa-header-actions button');
    const orig = btn.style.boxShadow;
    btn.style.boxShadow = '0 0 24px rgba(34,211,238,0.8)';
    setTimeout(() => btn.style.boxShadow = orig, 800);
  }

  function kasaExport() {
    const rows = kasaGetData();
    const headers = ['TARİH','TUTAR','İŞLEM','KİŞİ','TUTAR'];
    const csv = [headers.join(','), ...rows.map(r => r.map(c => `"${c.replace(/"/g,'""')}"`).join(','))].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'}));
    a.download = 'kasa-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function kasaImport(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const lines = e.target.result.replace(/^\uFEFF/,'').split('\n').filter(l => l.trim());
      const dataLines = lines.slice(1); // skip header
      const tbody = document.getElementById('kasa-tbody');
      tbody.innerHTML = '';
      kasaRowCount = 0;
      dataLines.forEach(line => {
        const cols = line.split(',').map(c => c.replace(/^"|"$/g,'').replace(/""/g,'"'));
        const row = kasaCreateRow();
        row.querySelectorAll('.kasa-td').forEach((td, i) => { if (cols[i] !== undefined) td.textContent = cols[i]; });
        tbody.appendChild(row);
      });
      kasaRenumberRows();
      kSel = null; kSelEnd = null; kRowSelMode = false; kasaHighlight();
    };
    reader.readAsText(file, 'utf-8');
    input.value = '';
  }

  // Load saved data on startup
  (function() {
    const saved = localStorage.getItem('kasa-data');
    if (!saved) return;
    try {
      const rows = JSON.parse(saved);
      const tbody = document.getElementById('kasa-tbody');
      tbody.innerHTML = '';
      kasaRowCount = 0;
      rows.forEach(cols => {
        const row = kasaCreateRow();
        row.querySelectorAll('.kasa-td').forEach((td, i) => { if (cols[i] !== undefined) td.textContent = cols[i]; });
        tbody.appendChild(row);
      });
      kasaRenumberRows();
    } catch(e) {}
  })();

  // Sidebar toggle
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const isOpen = sidebar.classList.contains('sidebar-open');
    if (isOpen) {
      sidebar.classList.remove('sidebar-open');
      overlay.classList.add('hidden');

  function fmt(n, d) {
    if (n == null || isNaN(n)) return '\u2013';
    return n.toLocaleString('tr-TR', { minimumFractionDigits: d, maximumFractionDigits: d });
  }
  function fmtVol(n) {
    if (!n) return '\u2013';
    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toLocaleString('tr-TR');
  }
  function fmtTime(ts) {
    if (!ts) return '\u2013';
    return new Date(ts * 1000).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  }

  function toggleSort(col) {
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = col === 'sym' || col === 'name'; }
    ['sym','name','price','chg','pct','vol'].forEach(c => {
      const el = document.getElementById('sort-' + c);
      if (!el) return;
      const labels = { sym:'SEMBOL', name:'\u015e\u0130RKET', price:'F\u0130YAT (\u20ba)', chg:'DE\u011e\u0130\u015e\u0130M', pct:'DE\u011e.%', vol:'HAC\u0130M' };
      el.textContent = c === sortCol ? labels[c] + (sortAsc ? ' \u2191' : ' \u2193') : labels[c];
    });
    hisseRenderTable();
  }

  function hisseFilter() {
    hisseFilter_q = (document.getElementById('hisse-search').value || '').toUpperCase().trim();
    hisseRenderTable();

  function hisseRenderTable() {
    const tbody = document.getElementById('hisse-tbody');
    if (!tbody) return;
    let rows = Object.values(hisseData);
    if (hisseFilter_q) {
      rows = rows.filter(d => {
        const sym = (d.symbol || '').replace(/\.IS$/i, '');
        const name = (d.shortName || d.longName || '').toUpperCase();
        return sym.includes(hisseFilter_q) || name.includes(hisseFilter_q);
      });
    }
    rows.sort((a, b) => {
      let va, vb;
      const sa = (a.symbol || '').replace(/\.IS$/i, '');
      const sb = (b.symbol || '').replace(/\.IS$/i, '');
      if (sortCol === 'sym')   { va = sa; vb = sb; }
      else if (sortCol === 'name')  { va = (a.shortName || a.longName || sa).toUpperCase(); vb = (b.shortName || b.longName || sb).toUpperCase(); }
      else if (sortCol === 'price') { va = a.regularMarketPrice || 0; vb = b.regularMarketPrice || 0; }
      else if (sortCol === 'chg')   { va = a.regularMarketChange || 0; vb = b.regularMarketChange || 0; }
      else if (sortCol === 'pct')   { va = a.regularMarketChangePercent || 0; vb = b.regularMarketChangePercent || 0; }
      else if (sortCol === 'vol')   { va = a.regularMarketVolume || 0; vb = b.regularMarketVolume || 0; }
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
    const count = document.getElementById('hisse-count');
    if (count) count.textContent = rows.length > 0 ? rows.length + ' hisse' : '';
    if (rows.length === 0) {
      const msg = Object.keys(hisseData).length === 0 ? 'Y\u00fckleniyor\u2026' : 'E\u015fle\u015fen hisse bulunamad\u0131.';
      tbody.innerHTML = '<tr><td colspan="8" class="mono" style="padding:48px 16px;text-align:center;color:#334155;font-size:13px">' + msg + '</td></tr>';

    tbody.innerHTML = rows.map((d, i) => {
      const sym = (d.symbol || '').replace(/\.IS$/i, '');
      const company = d.shortName || d.longName || sym;
      const chg = d.regularMarketChange;
      const chgPct = d.regularMarketChangePercent;
      const isPos = chg > 0, isNeg = chg < 0;
      const cc = isPos ? 'pos' : isNeg ? 'neg' : 'neu';
      const arrow = isPos ? '\u25b2 ' : isNeg ? '\u25bc ' : '';
      const chgStr = (isPos ? '+' : '') + fmt(chg, 2);
      const chgPctStr = (isPos ? '+' : '') + fmt(chgPct, 2) + '%';

        '<td class="hisse-td mono" style="text-align:center;color:#475569;font-size:12px">' + fmtTime(d.regularMarketTime) + '</td>' +
        '</tr>';
    }).join('');
  }

  function parseYahooSpark(json) {
    if (!json || typeof json !== 'object') return [];
    return Object.entries(json).map(([symbol, v]) => {
      if (!v || !v.close || !v.close.length) return null;
      const closes = v.close;
      const price = closes[closes.length - 1];
      const prev = v.chartPreviousClose || (closes.length > 1 ? closes[closes.length - 2] : price);
      if (!price || price <= 0) return null;
      const change = price - prev;
      const changePct = prev > 0 ? (change / prev * 100) : 0;
      const ts = v.timestamp ? v.timestamp[v.timestamp.length - 1] : null;
      return {
        symbol: symbol,
        shortName: symbol.replace(/\.IS$/i, ''),
        longName: symbol.replace(/\.IS$/i, ''),
        regularMarketPrice: price,
        regularMarketChange: change,
        regularMarketChangePercent: changePct,
        regularMarketVolume: 0,
        regularMarketTime: ts
      };
    }).filter(Boolean);
  }

  async function hisseFetchBatch(symbols) {
    const symsYahoo = symbols.map(s => s + '.IS').join(',');
    const yahooUrl = 'https://query1.finance.yahoo.com/v8/finance/spark?symbols=' + symsYahoo + '&range=5d&interval=1d';

    // Proxy denemeleri: CORS sorunu icin
    const attempts = [
      // 1. Yerel Python proxy (python proxy.py calisiyorsa - en guvenilir)
      'http://127.0.0.1:8765/' + yahooUrl,
      // 2. thingproxy
      'https://thingproxy.freeboard.io/fetch/' + yahooUrl,
      // 3. codetabs proxy
      'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(yahooUrl),
      // 4. corsproxy.io
      'https://corsproxy.io/?' + encodeURIComponent(yahooUrl),
    ];

    for (const url of attempts) {
      try {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 10000);
        const r = await fetch(url, { signal: ctrl.signal });
        clearTimeout(tid);
        if (!r.ok) continue;
        const json = await r.json();
        const result = parseYahooSpark(json);
        if (result.length > 0) return result;
      } catch(e) { /* sonraki proxy */ }
    }
    return [];
  }

  async function hisseFetchAll() {
    const btn = document.getElementById('hisse-refresh-btn');
    const icon = document.getElementById('hisse-refresh-icon');
    const status = document.getElementById('hisse-status');
    const pw = document.getElementById('hisse-progress-wrap');
    const pb = document.getElementById('hisse-progress-bar');
    if (btn) btn.disabled = true;
    if (icon) icon.classList.add('spinning');
    if (pw) pw.style.display = 'block';
    if (pb) pb.style.width = '0%';
    hisseData = {};
    hisseLoadedBatches = 0;
    const batches = [];
    for (let i = 0; i < BIST_ALL.length; i += HISSE_BATCH) batches.push(BIST_ALL.slice(i, i + HISSE_BATCH));
    hisseTotalBatches = batches.length;
    if (status) status.textContent = '0 / ' + BIST_ALL.length + ' arand\u0131...';
    await Promise.all(batches.map(async (batch) => {
      const quotes = await hisseFetchBatch(batch);
      quotes.forEach(q => {
        if (q && q.regularMarketPrice != null) {
          const sym = (q.symbol || '').replace(/\.IS$/i, '');
          hisseData[sym] = q;
        }
      });
      hisseLoadedBatches++;
      const done = Math.min(hisseLoadedBatches * HISSE_BATCH, BIST_ALL.length);
      if (status) status.textContent = done + ' / ' + BIST_ALL.length + ' arand\u0131...';
      if (pb) pb.style.width = Math.round((hisseLoadedBatches / hisseTotalBatches) * 100) + '%';
      hisseRenderTable();
    }));
    if (btn) btn.disabled = false;
    if (icon) icon.classList.remove('spinning');
    if (pb) { pb.style.width = '100%'; setTimeout(() => { if (pw) pw.style.display = 'none'; }, 600); }
    const now = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const n = Object.keys(hisseData).length;
    if (status) status.textContent = 'son: ' + now + ' \u2014 ' + n + ' hisse';
    hisseRenderTable();
    hisseResetCountdown();
    lucide.createIcons();
  }

  function hisseResetCountdown() {
    hisseCountdown = 60;
    if (hisseCountdownTimer) clearInterval(hisseCountdownTimer);
    const el = document.getElementById('hisse-timer');
    if (el) el.textContent = hisseCountdown + 's';
    hisseCountdownTimer = setInterval(() => {
      hisseCountdown--;
      const el2 = document.getElementById('hisse-timer');
      if (el2) el2.textContent = hisseCountdown + 's';
      if (hisseCountdown <= 0) { clearInterval(hisseCountdownTimer); hisseFetchAll(); }
    }, 1000);
  }

  async function hisseLoadDetailChart(sym) {
    const period = HISSE_PERIODS[hisseDetailPeriodIdx];
    const loading = document.getElementById('hd-loading');
    const canvas = document.getElementById('hd-chart-canvas');
    if (loading) loading.style.display = 'flex';
    if (hisseDetailChart) { hisseDetailChart.destroy(); hisseDetailChart = null; }
    const fullSym = sym + '.IS';
    const yahooUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/' + fullSym + '?range=' + period.range + '&interval=' + period.interval;
    const proxies = [
      'http://127.0.0.1:8765/' + yahooUrl,
      'https://thingproxy.freeboard.io/fetch/' + yahooUrl,
      'https://corsproxy.io/?' + encodeURIComponent(yahooUrl),
    ];
    let data = null;
    for (const url of proxies) {
      try {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 12000);
        const r = await fetch(url, { signal: ctrl.signal });
        clearTimeout(tid);
        if (!r.ok) continue;
        const json = await r.json();
        if (json?.chart?.result?.[0]) { data = json.chart.result[0]; break; }
      } catch(e) {}
    }
    if (loading) loading.style.display = 'none';
    if (!data) { return; }
    const meta = data.meta || {};
    const timestamps = data.timestamp || [];
    const quotes = data.indicators?.quote?.[0] || {};
    const closes = quotes.close || [];
    if (meta.regularMarketPrice) document.getElementById('hd-price').textContent = fmt(meta.regularMarketPrice, 2) + ' \u20ba';
    if (meta.shortName) document.getElementById('hd-name').textContent = meta.shortName;
    const points = timestamps.map((ts, i) => ({ ts, v: closes[i] })).filter(p => p.v != null);
    const labels = points.map(p => {
      const dt = new Date(p.ts * 1000);
      if (period.interval === '5m' || period.interval === '15m') return dt.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
      if (period.range === '1mo' || period.range === '3mo' || period.range === '6mo') return dt.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' });
      return dt.toLocaleDateString('tr-TR', { month: 'short', year: '2-digit' });
    });
    const values = points.map(p => p.v);
    const firstVal = values[0] || 0;
    const lastVal = values[values.length - 1] || firstVal;
    const isUp = lastVal >= firstVal;
    // Seçili döneme göre getiriyi güncelle
    if (firstVal > 0) {
      const periodReturn = ((lastVal - firstVal) / firstVal) * 100;
      const isReturnPos = periodReturn > 0;
      const arrow = isReturnPos ? '\u25b2 ' : periodReturn < 0 ? '\u25bc ' : '';
      const chgEl = document.getElementById('hd-chg');
      chgEl.textContent = arrow + (isReturnPos ? '+' : '') + fmt(Math.abs(periodReturn), 2) + '%';
      chgEl.style.color = isReturnPos ? '#34d399' : periodReturn < 0 ? '#f87171' : '#94a3b8';
    }
    const lineColor = isUp ? 'rgba(52,211,153,1)' : 'rgba(248,113,113,1)';
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.clientHeight || 300);
    grad.addColorStop(0, isUp ? 'rgba(52,211,153,0.28)' : 'rgba(248,113,113,0.28)');
    grad.addColorStop(1, isUp ? 'rgba(52,211,153,0.0)' : 'rgba(248,113,113,0.0)');
    hisseDetailChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: lineColor,
          borderWidth: 2,
          backgroundColor: grad,
          fill: true,
          tension: 0.2,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: lineColor,
          pointHoverBorderColor: '#0a0e1a',
          pointHoverBorderWidth: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(10,14,26,0.97)',
            borderColor: isUp ? 'rgba(52,211,153,0.45)' : 'rgba(248,113,113,0.45)',
            borderWidth: 1,
            titleColor: '#64748b',
            bodyColor: '#e2e8f0',
            titleFont: { family: "'JetBrains Mono', monospace", size: 10 },
            bodyFont: { family: "'JetBrains Mono', monospace", size: 13, weight: '700' },
            padding: 12,
            callbacks: {
              title: items => items[0]?.label || '',
              label: item => '  ' + fmt(item.parsed.y, 2) + ' \u20ba',
            }
          }
        },
        scales: {

    if (e.key === 'Escape') {
      const m = document.getElementById('hisse-detail-modal');
      if (m && m.style.display !== 'none') { hisseCloseDetail(); }

  document.body.insertAdjacentHTML('beforeend', `

  // ── ORTAKLIK Spreadsheet ───────────────────────────────────────
  // Korunan: index 0 (TARİH), son-2 (SERMAYE), son-1 (TUTAR)
  // Silinebilir: index 1 .. length-3 (C-H arası kişi sütunları)
  let ortColumns = ['TAR\u0130H','MER\u0130\u00c7','FAT\u0130H','MERTCAN','MERT CAN','AS\u0130YE','ERK\u0130N','SERMAYE','TUTAR'];
  let ortRowCount = 0;
  let oSel = null, oSelEnd = null, oEditCell = null;
  let oClip = null, oCutCells = [];
  let oRowSelMode = false, oCtxTargetRow = null, ortDelColTarget = -1;

  function ortIsDeleteable(i) { return i >= 1 && i <= ortColumns.length - 3; }

  function ortCell(r, c) {
    return document.querySelector(`#ort-tbody td[data-row="${r}"][data-col="${c}"]`);
  }

  function ortRebuildHeader() {
    const cg = document.getElementById('ort-colgroup');
    const thead = document.getElementById('ort-thead');
    const n = ortColumns.length;
    const w = Math.floor(96 / n);
    let cgHtml = '<col style="width:4%">';
    for (let i = 0; i < n; i++) cgHtml += `<col style="width:${w}%">`;
    cg.innerHTML = cgHtml;
    let thHtml = '<tr style="background:rgba(30,41,59,0.4)"><th class="px-2 py-3 text-center text-xs font-semibold mono" style="color:#334155;border-right:1px solid rgba(71,85,105,0.5)">#</th>';
    for (let i = 0; i < n; i++) {
      const canDel = ortIsDeleteable(i);
      const canInsertLeft = i >= 1;
      thHtml += `<th class="ort-col-th px-3 py-3 text-center text-xs font-semibold mono uppercase tracking-wider" data-col="${i}" style="color:#a78bfa;white-space:nowrap"${canInsertLeft ? ` oncontextmenu="ortColCtxShow(event,${i})"` : ''}><span>${ortColumns[i]}</span>`;
      if (canDel) thHtml += `<button class="ort-col-del-btn" onclick="event.stopPropagation();ortShowDeleteCol(${i})" title="${ortColumns[i]} s\u00fctununu sil">\u2715</button>`;
      thHtml += '</th>';
    }
    thHtml += '</tr>';
    thead.innerHTML = thHtml;
  }

  function ortRenumberCols() {
    document.querySelectorAll('#ort-tbody .ort-row').forEach(row => {
      row.querySelectorAll('.ort-td').forEach((td, i) => { td.dataset.col = i; });
    });
  }

  function ortCreateRow() {
    const r = ortRowCount++;
    const row = document.createElement('tr');
    row.className = 'ort-row';
    const numTd = document.createElement('td');
    numTd.className = 'ort-row-num';
    numTd.textContent = '\u2013';
    row.appendChild(numTd);
    for (let c = 0; c < ortColumns.length; c++) {
      const td = document.createElement('td');
      td.dataset.row = r; td.dataset.col = c;
      td.className = 'ort-td px-3 py-2 text-sm text-slate-300 mono text-center';
      td.style.height = '36px'; td.style.overflow = 'hidden';
      row.appendChild(td);
    }
    return row;
  }

  function ortAddRow() { document.getElementById('ort-tbody').appendChild(ortCreateRow()); ortRenumberRows(); }

  function ortAddRows() {
    const n = Math.max(1, parseInt(document.getElementById('ort-row-count').value) || 1);
    for (let i = 0; i < n; i++) document.getElementById('ort-tbody').appendChild(ortCreateRow());
    ortRenumberRows(); lucide.createIcons();
  }

  function ortRenumberRows() {
    document.querySelectorAll('#ort-tbody .ort-row').forEach((row, i) => {
      const n = row.querySelector('.ort-row-num'); if (n) n.textContent = i + 1;
    });
  }

  function ortHighlight() {
    document.querySelectorAll('#ort-tbody .ort-td').forEach(td => td.classList.remove('ort-anchor','ort-range'));
    document.querySelectorAll('#ort-tbody .ort-row-num').forEach(td => td.classList.remove('ort-row-selected'));
    if (!oSel) { ortUpdateOverlay(); return; }
    const r1=Math.min(oSel.r,(oSelEnd||oSel).r), r2=Math.max(oSel.r,(oSelEnd||oSel).r);
    const c1=Math.min(oSel.c,(oSelEnd||oSel).c), c2=Math.max(oSel.c,(oSelEnd||oSel).c);
    for (let r=r1; r<=r2; r++) {
      for (let c=c1; c<=c2; c++) {
        const td=ortCell(r,c); if(!td) continue;
        td.classList.add(r===oSel.r&&c===oSel.c?'ort-anchor':'ort-range');
      }
      if (oRowSelMode) { const fd=ortCell(r,0); if(fd){const nt=fd.closest('tr').querySelector('.ort-row-num');if(nt)nt.classList.add('ort-row-selected');} }
    }
    ortUpdateOverlay();
  }

  function ortUpdateOverlay() {
    const ol=document.getElementById('ort-sel-overlay');
    if (!ol||!oSel) { if(ol) ol.style.display='none'; return; }
    const r1=Math.min(oSel.r,(oSelEnd||oSel).r), r2=Math.max(oSel.r,(oSelEnd||oSel).r);
    const c1=Math.min(oSel.c,(oSelEnd||oSel).c), c2=Math.max(oSel.c,(oSelEnd||oSel).c);
    const tl=ortCell(r1,c1), br=ortCell(r2,c2);
    if (!tl||!br) { ol.style.display='none'; return; }
    const cont=ol.parentElement, cR=cont.getBoundingClientRect(), tlR=tl.getBoundingClientRect(), brR=br.getBoundingClientRect();
    ol.style.display='block';
    ol.style.left=(tlR.left-cR.left+cont.scrollLeft)+'px';
    ol.style.top=(tlR.top-cR.top+cont.scrollTop)+'px';
    ol.style.width=(brR.right-tlR.left)+'px';
    ol.style.height=(brR.bottom-tlR.top)+'px';
  }

  function ortEnterEdit(td, clear) {
    if (!td||oEditCell===td) return;
    ortExitEdit(); oEditCell=td; td.contentEditable='true'; td.classList.add('ort-editing');
    if (clear) td.textContent='';
    td.focus();
    if (!clear) { const rng=document.createRange(); rng.selectNodeContents(td); rng.collapse(false); window.getSelection().removeAllRanges(); window.getSelection().addRange(rng); }
  }
  function ortExitEdit() { if(!oEditCell) return; oEditCell.contentEditable='false'; oEditCell.classList.remove('ort-editing'); oEditCell=null; }

  function ortMoveSel(dr, dc, extend) {
    if (!oSel) return;
    const ref=extend?(oSelEnd||oSel):oSel;
    let nr=Math.max(0,ref.r+dr), nc=Math.max(0,Math.min(ortColumns.length-1,ref.c+dc));
    while (nr>=ortRowCount) ortAddRow();
    if (extend) { oSelEnd={r:nr,c:nc}; } else { oSel={r:nr,c:nc}; oSelEnd=null; }
    ortHighlight();
  }

  function ortClearSel() {
    if (!oSel) return;
    const r1=Math.min(oSel.r,(oSelEnd||oSel).r), r2=Math.max(oSel.r,(oSelEnd||oSel).r);
    const c1=Math.min(oSel.c,(oSelEnd||oSel).c), c2=Math.max(oSel.c,(oSelEnd||oSel).c);
    for (let r=r1;r<=r2;r++) for (let c=c1;c<=c2;c++) { const t=ortCell(r,c); if(t) t.textContent=''; }
  }

  function ortCopy(cut) {
    if (!oSel) return;
    const r1=Math.min(oSel.r,(oSelEnd||oSel).r), r2=Math.max(oSel.r,(oSelEnd||oSel).r);
    const c1=Math.min(oSel.c,(oSelEnd||oSel).c), c2=Math.max(oSel.c,(oSelEnd||oSel).c);
    const data=[];
    for (let r=r1;r<=r2;r++) { const row=[]; for (let c=c1;c<=c2;c++) { const t=ortCell(r,c); row.push(t?t.textContent:''); } data.push(row); }
    oCutCells.forEach(t=>t.classList.remove('ort-cut')); oCutCells=[];
    oClip={data,cut};
    if (cut) { for (let r=r1;r<=r2;r++) for (let c=c1;c<=c2;c++) { const t=ortCell(r,c); if(t){t.classList.add('ort-cut');oCutCells.push(t);} } }
  }

  function ortPaste() {
    if (!oClip||!oSel) return;
    const{data,cut}=oClip; const sr=oSel.r,sc=oSel.c;
    while (ortRowCount<sr+data.length) ortAddRow();
    for (let dr=0;dr<data.length;dr++) for (let dc=0;dc<data[dr].length;dc++) { if(sc+dc>=ortColumns.length)continue; const t=ortCell(sr+dr,sc+dc); if(t) t.textContent=data[dr][dc]; }
    if (cut) { oCutCells.forEach(t=>{t.textContent='';t.classList.remove('ort-cut');}); oCutCells=[]; oClip=null; }
  }

  // ── Sütun yönetimi ────────────────────────────────────────────
  let ortColCtxTarget = -1;

  function ortColCtxShow(e, colIdx) {
    e.preventDefault(); e.stopPropagation();
    ortColCtxTarget = colIdx;
    const menu = document.getElementById('ort-col-ctx-menu');
    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    setTimeout(() => {
      const rect = menu.getBoundingClientRect();
      if (rect.right > window.innerWidth) menu.style.left = (e.clientX - rect.width) + 'px';
      if (rect.bottom > window.innerHeight) menu.style.top = (e.clientY - rect.height) + 'px';
    }, 0);
  }

  function ortInsertColLeft() {
    document.getElementById('ort-col-ctx-menu').style.display = 'none';
    const colIdx = ortColCtxTarget;
    if (colIdx < 1) return;
    const name = prompt('Yeni s\u00fctun ad\u0131:', '');
    if (name === null || !name.trim()) return;
    const col = name.trim().toUpperCase();
    ortColumns.splice(colIdx, 0, col);
    document.querySelectorAll('#ort-tbody .ort-row').forEach(row => {
      const cells = row.querySelectorAll('.ort-td');
      const rowIdx = cells.length > 0 ? +cells[0].dataset.row : 0;
      const td = document.createElement('td');
      td.dataset.row = rowIdx; td.dataset.col = colIdx;
      td.className = 'ort-td px-3 py-2 text-sm text-slate-300 mono text-center';
      td.style.height = '36px'; td.style.overflow = 'hidden';
      if (cells[colIdx]) row.insertBefore(td, cells[colIdx]); else row.appendChild(td);
    });
    ortRenumberCols(); ortRebuildHeader();
    oSel = null; oSelEnd = null; ortHighlight(); lucide.createIcons();
  }

  function ortAddCol() {
    const name = prompt('Yeni s\u00fctun ad\u0131 (SERMAYE\u2019dan \u00f6nce eklenecek):','');
    if (name===null||!name.trim()) return;
    const col = name.trim().toUpperCase();
    const insertAt = ortColumns.length - 2;
    ortColumns.splice(insertAt, 0, col);
    document.querySelectorAll('#ort-tbody .ort-row').forEach(row => {
      const cells = row.querySelectorAll('.ort-td');
      const rowIdx = cells.length>0 ? +cells[0].dataset.row : 0;
      const td = document.createElement('td');
      td.dataset.row = rowIdx; td.dataset.col = insertAt;
      td.className = 'ort-td px-3 py-2 text-sm text-slate-300 mono text-center';
      td.style.height='36px'; td.style.overflow='hidden';
      if (cells[insertAt]) row.insertBefore(td, cells[insertAt]); else row.appendChild(td);
    });
    ortRenumberCols(); ortRebuildHeader();
    oSel=null; oSelEnd=null; ortHighlight(); lucide.createIcons();
  }

  function ortShowDeleteCol(colIndex) {
    if (!ortIsDeleteable(colIndex)) return;
    ortDelColTarget = colIndex;
    const name = ortColumns[colIndex];
    document.getElementById('ort-del-col-name').textContent = name;
    document.getElementById('ort-del-col-required').textContent = name + ' silmeyi onayl\u0131yorum';
    document.getElementById('ort-del-col-input').value = '';
    document.getElementById('ort-del-col-input').style.borderColor = 'rgba(71,85,105,0.5)';
    const btn = document.getElementById('ort-del-col-confirm');
    btn.disabled=true; btn.style.opacity='0.4'; btn.style.cursor='not-allowed';
    document.getElementById('ort-del-col-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('ort-del-col-input').focus(), 50);
  }

  function ortDelColCheck() {
    if (ortDelColTarget < 0) return;
    const name = ortColumns[ortDelColTarget];
    const required = name + ' silmeyi onayl\u0131yorum';
    const typed = document.getElementById('ort-del-col-input').value;
    const ok = typed === required;
    const btn = document.getElementById('ort-del-col-confirm');
    btn.disabled=!ok; btn.style.opacity=ok?'1':'0.4'; btn.style.cursor=ok?'pointer':'not-allowed';
    const inp = document.getElementById('ort-del-col-input');
    inp.style.borderColor = typed&&ok ? 'rgba(52,211,153,0.6)' : typed&&!ok ? 'rgba(239,68,68,0.5)' : 'rgba(71,85,105,0.5)';
  }

  function ortCancelDeleteCol() {
    document.getElementById('ort-del-col-modal').style.display = 'none';
    ortDelColTarget = -1;
  }

  function ortConfirmDeleteCol() {
    if (ortDelColTarget < 0) return;
    const name = ortColumns[ortDelColTarget];
    if (document.getElementById('ort-del-col-input').value !== name + ' silmeyi onayl\u0131yorum') return;
    const colIdx = ortDelColTarget;
    ortColumns.splice(colIdx, 1);
    document.querySelectorAll('#ort-tbody .ort-row').forEach(row => {
      const cells = row.querySelectorAll('.ort-td');
      if (cells[colIdx]) cells[colIdx].remove();
    });
    ortRenumberCols(); ortRebuildHeader();
    document.getElementById('ort-del-col-modal').style.display = 'none';
    ortDelColTarget = -1; oSel=null; oSelEnd=null; ortHighlight();
  }

  // ── Grid olayları ─────────────────────────────────────────────
  const ortGrid = document.getElementById('ort-grid');
  let oDragging = false;

  ortGrid.addEventListener('mousedown', e => {
    const numTd = e.target.closest('#ort-tbody .ort-row-num');
    if (numTd) {
      if (oEditCell) ortExitEdit();
      const fd = numTd.closest('tr').querySelector('.ort-td'); if(!fd) return;
      const r = +fd.dataset.row;
      if (e.shiftKey&&oSel&&oRowSelMode) { oSelEnd={r,c:ortColumns.length-1}; oSel={r:oSel.r,c:0}; }
      else { oSel={r,c:0}; oSelEnd={r,c:ortColumns.length-1}; }
      oRowSelMode=true; ortHighlight(); ortGrid.focus(); oDragging=true; e.preventDefault(); return;
    }
    const td = e.target.closest('#ort-tbody .ort-td');
    if (!td) { if(oEditCell){ortExitEdit();ortHighlight();} return; }
    if (oEditCell&&oEditCell!==td) ortExitEdit();
    oRowSelMode=false;
    const r=+td.dataset.row, c=+td.dataset.col;
    if (e.shiftKey&&oSel) { oSelEnd={r,c}; } else { oSel={r,c}; oSelEnd=null; }
    ortHighlight(); ortGrid.focus(); oDragging=true; e.preventDefault();
  });

  document.addEventListener('mouseover', e => {
    if (!oDragging||!oSel) return;
    if (oRowSelMode) {
      const el=e.target.closest('#ort-tbody .ort-row-num')||e.target.closest('#ort-tbody .ort-td');
      if (!el) return; const fd=el.closest('tr').querySelector('.ort-td'); if(!fd) return;
      oSelEnd={r:+fd.dataset.row,c:ortColumns.length-1}; oSel={r:oSel.r,c:0};
    } else {
      const td=e.target.closest('#ort-tbody .ort-td'); if(!td) return;
      oSelEnd={r:+td.dataset.row,c:+td.dataset.col};
    }
    ortHighlight();
  });

  document.addEventListener('mouseup', () => { oDragging = false; });

  ortGrid.addEventListener('dblclick', e => {
    const td=e.target.closest('#ort-tbody .ort-td'); if(!td) return;
    oSel={r:+td.dataset.row,c:+td.dataset.col}; oSelEnd=null; ortHighlight(); ortEnterEdit(td,false);
  });

  ortGrid.addEventListener('keydown', e => {
    if (oEditCell) {
      if (e.key==='Escape'){e.preventDefault();ortExitEdit();ortHighlight();ortGrid.focus();}
      else if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();ortExitEdit();ortMoveSel(1,0,false);ortGrid.focus();}
      else if (e.key==='Tab'){e.preventDefault();ortExitEdit();ortMoveSel(0,e.shiftKey?-1:1,false);ortGrid.focus();}
      return;
    }
    if (!oSel) return;
    if (e.ctrlKey||e.metaKey) {
      if (e.key==='c'){e.preventDefault();ortCopy(false);}
      else if (e.key==='x'){e.preventDefault();ortCopy(true);}
      else if (e.key==='v'){e.preventDefault();ortPaste();}
      return;
    }
    const arrows={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
    if (arrows[e.key]){e.preventDefault();ortMoveSel(...arrows[e.key],e.shiftKey);return;}
    if (e.key==='Delete'||e.key==='Backspace'){e.preventDefault();if(oRowSelMode)ortDeleteSelectedRows();else ortClearSel();return;}
    if (e.key==='F2'){e.preventDefault();ortEnterEdit(ortCell(oSel.r,oSel.c),false);return;}
    if (e.key==='Enter'){e.preventDefault();ortEnterEdit(ortCell(oSel.r,oSel.c),false);return;}
    if (e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey) ortEnterEdit(ortCell(oSel.r,oSel.c),true);
  });

  // ── Satır işlemleri ───────────────────────────────────────────
  function ortDeleteSelectedRows() {
    if (!oSel) return;
    const r1=Math.min(oSel.r,(oSelEnd||oSel).r), r2=Math.max(oSel.r,(oSelEnd||oSel).r);
    for (let r=r1;r<=r2;r++) { const td=ortCell(r,0); if(td) td.closest('tr').remove(); }
    oSel=null; oSelEnd=null; oRowSelMode=false; ortHighlight(); ortRenumberRows();
  }
  function ortCtxInsertAbove() {
    document.getElementById('ort-ctx-menu').style.display='none';
    if (oCtxTargetRow===null) return;
    const r1=oSel?Math.min(oSel.r,(oSelEnd||oSel).r):oCtxTargetRow;
    const refTd=ortCell(r1,0); if(!refTd) return;
    document.getElementById('ort-tbody').insertBefore(ortCreateRow(),refTd.closest('tr'));
    ortRenumberRows(); oSel=null; oSelEnd=null; oRowSelMode=false; ortHighlight();
  }
  function ortCtxInsertBelow() {
    document.getElementById('ort-ctx-menu').style.display='none';
    if (oCtxTargetRow===null) return;
    const r2=oSel?Math.max(oSel.r,(oSelEnd||oSel).r):oCtxTargetRow;
    const refTd=ortCell(r2,0); if(!refTd) return;
    document.getElementById('ort-tbody').insertBefore(ortCreateRow(),refTd.closest('tr').nextSibling);
    ortRenumberRows(); oSel=null; oSelEnd=null; oRowSelMode=false; ortHighlight();
  }
  function ortCtxDeleteRows() { document.getElementById('ort-ctx-menu').style.display='none'; ortDeleteSelectedRows(); }

  ortGrid.addEventListener('contextmenu', e => {
    const numTd=e.target.closest('#ort-tbody .ort-row-num'); if(!numTd) return;
    e.preventDefault();
    const fd=numTd.closest('tr').querySelector('.ort-td'); if(!fd) return;
    const r=+fd.dataset.row;
    const r1=oSel&&oRowSelMode?Math.min(oSel.r,(oSelEnd||oSel).r):r+1;
    const r2=oSel&&oRowSelMode?Math.max(oSel.r,(oSelEnd||oSel).r):r-1;
    if (!oRowSelMode||r<r1||r>r2) { oSel={r,c:0}; oSelEnd={r,c:ortColumns.length-1}; oRowSelMode=true; ortHighlight(); }
    oCtxTargetRow=r;
    const menu=document.getElementById('ort-ctx-menu');
    menu.style.display='block'; menu.style.left=e.clientX+'px'; menu.style.top=e.clientY+'px';
    setTimeout(()=>{ const rect=menu.getBoundingClientRect(); if(rect.right>window.innerWidth)menu.style.left=(e.clientX-rect.width)+'px'; if(rect.bottom>window.innerHeight)menu.style.top=(e.clientY-rect.height)+'px'; },0);
  });

  // ── Kaydet / Aktar / İçeri Al ─────────────────────────────────
  function ortGetData() {
    const rows=[];
    document.querySelectorAll('#ort-tbody .ort-row').forEach(row => {
      const cells=row.querySelectorAll('.ort-td'); rows.push([...cells].map(td=>td.textContent));

  }
  function ortExport() {
    const{columns,rows}=ortGetData();
    const csv=[columns.join(','),...rows.map(r=>r.map(c=>`"${c.replace(/"/g,'""')}"`).join(','))].join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download='ortaklik-'+new Date().toISOString().slice(0,10)+'.csv';
    a.click(); URL.revokeObjectURL(a.href);
  }
  function ortImport(input) {
    const file=input.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const parseCsv=line=>{ const r=[]; let cur='',inQ=false; for(const ch of line+','){if(ch==='"'){if(inQ&&line[line.indexOf(ch)+1]==='"'){cur+='"';}else inQ=!inQ;}else if(ch===','&&!inQ){r.push(cur);cur='';}else cur+=ch;} return r; };
      const lines=e.target.result.replace(/^\uFEFF/,'').split('\n').filter(l=>l.trim());
      if (!lines.length) return;
      const cols=parseCsv(lines[0]); if(cols.length>0){ortColumns=cols;ortRebuildHeader();}
      const tbody=document.getElementById('ort-tbody'); tbody.innerHTML=''; ortRowCount=0;
      lines.slice(1).forEach(line=>{ const cv=parseCsv(line); const row=ortCreateRow(); row.querySelectorAll('.ort-td').forEach((td,i)=>{if(cv[i]!==undefined)td.textContent=cv[i];}); tbody.appendChild(row); });
      ortRenumberRows(); oSel=null; oSelEnd=null; oRowSelMode=false; ortHighlight();
    };
    reader.readAsText(file,'utf-8'); input.value='';
  }

  function ortParseNum(str) {
    if (!str || !str.trim()) return null;

  function ortRenderChart() {
    const rows = [...document.querySelectorAll('#ort-tbody .ort-row')];
    const labels = rows.map(r => { const td = r.querySelector('.ort-td[data-col="0"]'); return td ? td.textContent.trim() : ''; });
    // Collect datasets for columns 1..end, skip entirely-empty columns
    const numCols = ortColumns.length;
    const datasets = [];
    for (let c = 1; c < numCols; c++) {
      const vals = rows.map(r => { const td = r.querySelector(`.ort-td[data-col="${c}"]`); return td ? ortParseNum(td.textContent) : null; });
      if (vals.every(v => v === null)) continue;
      const ci = (c - 1) % ORT_CHART_COLORS.length;
      datasets.push({
        label: ortColumns[c],
        data: vals,
        backgroundColor: ORT_CHART_COLORS[ci].bg,
        borderColor: ORT_CHART_COLORS[ci].border,
        borderWidth: 1.5,
        borderRadius: 4,
        borderSkipped: false,
      });
    }
    // Legend
    const legend = document.getElementById('ort-chart-legend');
    legend.innerHTML = datasets.map((ds, i) => `<button class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs mono font-semibold transition-all" data-ds="${i}" onclick="ortToggleDataset(this,${i})" style="color:#e2e8f0;background:${ds.backgroundColor};border:1px solid ${ds.borderColor};box-shadow:0 0 8px ${ds.borderColor.replace('1)','0.35)')}">${ds.label}</button>`).join('');
    // Chart

        interaction: { mode: 'index', intersect: false },

            }

        scales: {

            ticks: { color:'#64748b', font:{ family:'\'JetBrains Mono\', monospace', size:10 } },

          }
        }

    });
  }

  function ortToggleDataset(btn, idx) {

    });
